name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build with xcodebuild
      run: |
        xcodebuild -project kfd.xcodeproj \
          -scheme kfd \
          -sdk iphoneos \
          -configuration Release \
          -derivedDataPath ./build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          clean build 2>&1 | tee build.log

    - name: Create IPA
      run: |
        echo "=== Checking build directory ==="
        ls -la build/Build/Products/Release-iphoneos/
        echo "=== Checking kfd.app ==="
        ls -la build/Build/Products/Release-iphoneos/kfd.app/
        echo "=== App size ==="
        du -sh build/Build/Products/Release-iphoneos/kfd.app/
        echo "=== Creating IPA ==="
        mkdir -p Payload
        cp -r build/Build/Products/Release-iphoneos/kfd.app Payload/
        zip -r kfd.ipa Payload
        rm -rf Payload
        echo "=== IPA size ==="
        ls -lh kfd.ipa

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: kfd-ipa
        path: kfd.ipa

    - name: Upload Build Log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log
